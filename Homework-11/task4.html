<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Progress Bar</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        h2 {
            margin-bottom: 16px;
            font-weight: 500;
        }
        .bar-wrap {
            width: 420px;
            height: 22px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #4caf50;
            transition: width 0.25s ease;
        }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
        }
    </style>
</head>
<body>
    <h2>Выполнение задачи</h2>
    <div class="bar-wrap">
        <div id="progress-bar"></div>
    </div>
    <div id="status">0%</div>

    <script>
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status');
        let progress = 0;

        // 5 шагов по 20% каждую секунду = 5 секунд итого
        const timer = setInterval(() => {
            progress += 20;
            bar.style.width = progress + '%';
            status.textContent = progress + '%';

            if (progress >= 100) {
                clearInterval(timer);
                status.textContent = 'Готово!';
            }
        }, 1000);
    </script>
</body>
</html>
