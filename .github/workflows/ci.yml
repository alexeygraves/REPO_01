name: Selenium Tests

on:
  push:
    branches: [ testirovanie-prikladnogo-po ]
  pull_request:
    branches: [ testirovanie-prikladnogo-po ]

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # installs Chrome stable + matching ChromeDriver, both in PATH
      - uses: browser-actions/setup-chrome@latest
        id: setup-chrome
        with:
          chrome-version: stable

      # SE_CHROMEDRIVER tells Selenium Manager to skip its own download
      # and use the already-installed driver from setup-chrome
      - name: Export ChromeDriver path
        run: echo "SE_CHROMEDRIVER=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      # tests will fail: service is not running in CI — expected per assignment
      - name: Run Selenium tests
        run: pytest tests/ -v --tb=short
