name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  issues: write

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: browser-actions/setup-chrome@latest
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Export ChromeDriver path
        run: echo "SE_CHROMEDRIVER=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Start F-Bank service
        run: |
          python3 -m http.server 8000 --directory dist &
          sleep 2

      - name: Take bug screenshots
        run: python3 tests/take_screenshots.py

      - name: Commit screenshots and update issues
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add screenshots/
          if git diff --staged --quiet; then
            echo "screenshots already committed"
          else
            git commit -m "add bug screenshots [skip ci]"
            git push
          fi

          BASE="https://raw.githubusercontent.com/${REPO}/main/screenshots"

          HAS_COMMENT_3=$(gh api "repos/${REPO}/issues/3/comments" | python3 -c "
          import sys, json
          comments = json.load(sys.stdin)
          print('true' if any('bug-001' in c.get('body','') for c in comments) else 'false')
          ")

          if [ "$HAS_COMMENT_3" != "true" ]; then
            python3 - <<PYEOF
          import os, urllib.request, json
          repo = os.environ['REPO']
          base = os.environ['BASE']
          body = "**Screenshot (BUG-001):**\n\n![bug-001](" + base + "/bug-001.png)\n\nAmount: 150. Commission shown: **10** instead of expected **15**."
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/3/comments",
              data=data,
              headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Content-Type": "application/json"},
              method="POST"
          )
          urllib.request.urlopen(req)
          print("issue 3 comment posted")
          PYEOF
          fi

          HAS_COMMENT_4=$(gh api "repos/${REPO}/issues/4/comments" | python3 -c "
          import sys, json
          comments = json.load(sys.stdin)
          print('true' if any('bug-002' in c.get('body','') for c in comments) else 'false')
          ")

          if [ "$HAS_COMMENT_4" != "true" ]; then
            python3 - <<PYEOF
          import os, urllib.request, json
          repo = os.environ['REPO']
          base = os.environ['BASE']
          body = "**Screenshot (BUG-002):**\n\n![bug-002](" + base + "/bug-002.png)\n\nBalance: 1100. Amount: 1000, commission: 100. Total = 1100 = balance. Transfer button is disabled but should be active."
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/4/comments",
              data=data,
              headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Content-Type": "application/json"},
              method="POST"
          )
          urllib.request.urlopen(req)
          print("issue 4 comment posted")
          PYEOF
          fi

      - name: Run Selenium tests
        run: pytest tests/ -v --tb=short
