name: Selenium Tests

on:
  push:
    branches: [ testirovanie-prikladnogo-po ]
  pull_request:
    branches: [ testirovanie-prikladnogo-po ]

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      # tests will fail: service is not running in CI
      # that is expected — build must be red per assignment requirements
      - name: Run Selenium tests
        run: pytest tests/ -v --tb=short
